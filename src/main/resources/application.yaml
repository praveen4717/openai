spring:
  application:
    name: openai
  ai:
    openai:
      api-key: ${OPEN_API_KEY}
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

  # FIX 1: Properly nested H2 Console properties
  h2:
    console:
      enabled: true
      path: /h2-console

  # FIX 2: Properly indented datasource (shifted right by 2 spaces)
  datasource:
    url: jdbc:h2:file:D:\chatmemory;AUTO_SERVER=true
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # FIX 3: Correct standard way to point to your custom schema script
  sql:
    init:
      schema-locations: classpath:/schema/schema-h2db.sql

logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG